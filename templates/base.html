<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Sleep Disorder Classification Using Machine Learning </title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for modern icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    {% load static %}
    <style>
        :root {
            --primary-glow: #00f3ff;
            --secondary-glow: #bc13fe;
            --bg-grad-start: #060b19;
            --bg-grad-mid: #160e28;
            --bg-grad-end: #071b2d;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-grad-start) 0%, var(--bg-grad-mid) 50%, var(--bg-grad-end) 100%);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            overflow-x: hidden;
            display: flex;
        }

        /* ===== Background Image Overlay ===== */
        .bg-image-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('/static/assets/img/sleep_bg_main.png') center center / cover no-repeat;
            opacity: 0.12;
            z-index: 0;
            pointer-events: none;
        }

        /* ===== EEG Brainwave Lines ===== */
        .eeg-waves {
            position: fixed;
            bottom: 0; left: 0;
            width: 200%; height: 200px;
            z-index: 1;
            pointer-events: none;
            opacity: 0.18;
        }
        .eeg-wave {
            position: absolute;
            width: 100%; height: 100%;
        }
        .eeg-wave svg {
            width: 100%; height: 100%;
        }
        .eeg-wave-1 { animation: eegScroll 18s linear infinite; bottom: 20px; }
        .eeg-wave-2 { animation: eegScroll 25s linear infinite reverse; bottom: 60px; opacity: 0.6; }
        .eeg-wave-3 { animation: eegScroll 30s linear infinite; bottom: 100px; opacity: 0.3; }

        @keyframes eegScroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* ===== Heartbeat ECG Line ===== */
        .heartbeat-line {
            position: fixed;
            top: 50%;
            left: 0;
            width: 200%;
            height: 80px;
            z-index: 1;
            pointer-events: none;
            opacity: 0.1;
            animation: heartbeatScroll 12s linear infinite;
        }
        .heartbeat-line svg { width: 100%; height: 100%; }

        @keyframes heartbeatScroll {
            0% { transform: translateX(0) translateY(0); }
            100% { transform: translateX(-50%) translateY(0); }
        }

        /* ===== Floating Sleep Icons (CSS-only) ===== */
        .sleep-icons-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }
        .sleep-icon {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0.06;
            color: #a78bfa;
            animation: floatUpIcon linear infinite;
        }
        .sleep-icon:nth-child(1) { left: 5%; animation-duration: 22s; animation-delay: 0s; font-size: 2rem; }
        .sleep-icon:nth-child(2) { left: 15%; animation-duration: 28s; animation-delay: 3s; font-size: 1.2rem; }
        .sleep-icon:nth-child(3) { left: 30%; animation-duration: 20s; animation-delay: 6s; font-size: 1.8rem; color: #67e8f9; }
        .sleep-icon:nth-child(4) { left: 45%; animation-duration: 25s; animation-delay: 2s; }
        .sleep-icon:nth-child(5) { left: 60%; animation-duration: 30s; animation-delay: 8s; font-size: 1rem; color: #c084fc; }
        .sleep-icon:nth-child(6) { left: 75%; animation-duration: 24s; animation-delay: 5s; font-size: 2.2rem; color: #67e8f9; }
        .sleep-icon:nth-child(7) { left: 88%; animation-duration: 26s; animation-delay: 1s; font-size: 1.4rem; }
        .sleep-icon:nth-child(8) { left: 50%; animation-duration: 32s; animation-delay: 10s; font-size: 1.6rem; color: #a78bfa; }

        @keyframes floatUpIcon {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.08; }
            90% { opacity: 0.06; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* ===== Glowing Orbs ===== */
        .glow-orbs {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: orbFloat 20s ease-in-out infinite alternate;
        }
        .glow-orb-1 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(0, 243, 255, 0.08) 0%, transparent 70%);
            top: 10%; left: -5%;
            animation-duration: 25s;
        }
        .glow-orb-2 {
            width: 350px; height: 350px;
            background: radial-gradient(circle, rgba(188, 19, 254, 0.06) 0%, transparent 70%);
            bottom: 20%; right: -8%;
            animation-duration: 30s;
            animation-delay: 5s;
        }
        .glow-orb-3 {
            width: 250px; height: 250px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.06) 0%, transparent 70%);
            top: 60%; left: 40%;
            animation-duration: 22s;
            animation-delay: 10s;
        }

        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -20px) scale(1.05); }
            66% { transform: translate(-20px, 15px) scale(0.95); }
            100% { transform: translate(10px, -30px) scale(1.02); }
        }

        /* Abstract moon element */
        .moon {
            position: fixed;
            top: 8%;
            right: 12%;
            width: 120px;
            height: 120px;
            background: transparent;
            border-radius: 50%;
            box-shadow: 20px 20px 0 0 rgba(224, 231, 255, 0.8);
            animation: floatMoon 12s ease-in-out infinite, moonGlow 6s alternate infinite;
            z-index: 1;
        }

        @keyframes floatMoon {
            0%, 100% { transform: translateY(0) rotate(-10deg); }
            50% { transform: translateY(-20px) rotate(-10deg); }
        }

        @keyframes moonGlow {
            0% { filter: drop-shadow(0 0 15px rgba(224, 231, 255, 0.4)); }
            100% { filter: drop-shadow(0 0 40px rgba(224, 231, 255, 0.9)); }
        }

        /* Moon halo ring */
        .moon::after {
            content: '';
            position: absolute;
            top: -20px; left: -20px;
            width: 160px; height: 160px;
            border-radius: 50%;
            border: 1px solid rgba(224, 231, 255, 0.1);
            animation: moonHalo 8s ease-in-out infinite alternate;
        }
        @keyframes moonHalo {
            0% { transform: scale(1); opacity: 0.3; }
            100% { transform: scale(1.3); opacity: 0.05; }
        }

        /* Particles canvas for neural/starry background */
        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Starry dots */
        .stars-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(2px 2px at 20px 30px, #ffffff, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 40px 70px, rgba(255, 255, 255, 0.8), rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 50px 160px, rgba(255, 255, 255, 0.6), rgba(0, 0, 0, 0)),
                radial-gradient(1px 1px at 120px 90px, rgba(200, 200, 255, 0.9), rgba(0, 0, 0, 0)),
                radial-gradient(1.5px 1.5px at 170px 120px, rgba(180, 220, 255, 0.7), rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 90px 40px, rgba(255, 255, 255, 0.9), rgba(0, 0, 0, 0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: twinkle 5s linear infinite alternate;
            opacity: 0.3;
            z-index: 1;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; }
            50% { opacity: 0.5; }
            100% { opacity: 0.6; }
        }

        /* Navbar Styling */
        .top-navbar {
            background: rgba(16, 20, 38, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 15px 30px;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .top-navbar .navbar-brand {
            color: #fff;
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: 1px;
            background: linear-gradient(to right, var(--primary-glow), var(--secondary-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-menu {
            display: flex;
            gap: 20px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-menu .nav-link {
            color: var(--text-muted);
            padding: 10px 15px;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .nav-menu .nav-link:hover {
            background: rgba(0, 243, 255, 0.1);
            color: var(--primary-glow);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.15);
        }

        .content {
            padding: 100px 40px 40px 40px; /* Offset for top navbar */
            width: 100%;
            position: relative;
            z-index: 10;
        }

        /* Reusable Glassmorphism Card for content */
        .glass-card {
            background: rgba(16, 20, 38, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            padding: 40px;
            color: #fff;
            margin-top: 20px;
        }

        h2.page-title {
            color: #fff;
            font-weight: 700;
            margin-bottom: 30px;
        }

        /* Global Form & Button Styles */
        .form-control {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            border-radius: 10px;
            padding: 12px;
        }

        .form-control:focus {
            background: rgba(0,0,0,0.5);
            border-color: var(--primary-glow);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
            color: #fff;
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--primary-glow), var(--secondary-glow));
            border: none;
            border-radius: 10px;
            font-weight: 600;
            padding: 12px 25px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
            color: #fff;
        }

        .btn-primary:hover {
            box-shadow: 0 0 25px rgba(188, 19, 254, 0.4);
            transform: translateY(-2px);
            color: #fff;
        }
    </style>
</head>

<body>

    <!-- ===== Background Visual Layers ===== -->
    <div class="bg-image-overlay"></div>
    <div class="glow-orbs">
        <div class="glow-orb glow-orb-1"></div>
        <div class="glow-orb glow-orb-2"></div>
        <div class="glow-orb glow-orb-3"></div>
    </div>
    <div id="particles-js"></div>
    <div class="stars-overlay"></div>
    <div class="moon"></div>

    <!-- Floating Sleep-themed Icons -->
    <div class="sleep-icons-container">
        <i class="sleep-icon fa-solid fa-moon"></i>
        <i class="sleep-icon fa-solid fa-bed"></i>
        <i class="sleep-icon fa-solid fa-brain"></i>
        <i class="sleep-icon fa-solid fa-heart-pulse"></i>
        <i class="sleep-icon fa-solid fa-cloud-moon"></i>
        <i class="sleep-icon fa-solid fa-wave-square"></i>
        <i class="sleep-icon fa-solid fa-star"></i>
        <i class="sleep-icon fa-solid fa-lungs"></i>
    </div>

    <!-- EEG Brainwave Lines -->
    <div class="eeg-waves">
        <div class="eeg-wave eeg-wave-1">
            <svg viewBox="0 0 2400 200" preserveAspectRatio="none">

            </svg>
        </div>
        <div class="eeg-wave eeg-wave-2">
            <svg viewBox="0 0 2400 200" preserveAspectRatio="none">
                <path d="M0,100 L80,100 L90,60 L100,140 L110,90 L120,110 L130,100 L230,100 L240,50 L250,150 L260,75 L270,125 L280,100 L380,100 L390,45 L400,155 L410,70 L420,130 L430,100 L530,100 L540,60 L550,140 L560,85 L570,115 L580,100 L680,100 L690,55 L700,145 L710,80 L720,120 L730,100 L830,100 L840,50 L850,150 L860,75 L870,125 L880,100 L980,100 L990,45 L1000,155 L1010,70 L1020,130 L1030,100 L1130,100 L1140,60 L1150,140 L1160,85 L1170,115 L1180,100 L1280,100 L1290,55 L1300,145 L1310,80 L1320,120 L1330,100 L1430,100 L1440,50 L1450,150 L1460,75 L1470,125 L1480,100 L1580,100 L1590,45 L1600,155 L1610,70 L1620,130 L1630,100 L1730,100 L1740,60 L1750,140 L1760,85 L1770,115 L1780,100 L1880,100 L1890,55 L1900,145 L1910,80 L1920,120 L1930,100 L2030,100 L2040,50 L2050,150 L2060,75 L2070,125 L2080,100 L2180,100 L2190,45 L2200,155 L2210,70 L2220,130 L2230,100 L2330,100 L2340,60 L2350,140 L2360,85 L2370,115 L2380,100 L2400,100" fill="none" stroke="rgba(188, 19, 254, 0.4)" stroke-width="1"/>

        </div>
        <div class="eeg-wave eeg-wave-3">
            <svg viewBox="0 0 2400 200" preserveAspectRatio="none">
                <path d="M0,100 L120,100 L130,70 L140,130 L150,90 L160,110 L170,100 L290,100 L300,65 L310,135 L320,85 L330,115 L340,100 L460,100 L470,70 L480,130 L490,90 L500,110 L510,100 L630,100 L640,65 L650,135 L660,85 L670,115 L680,100 L800,100 L810,70 L820,130 L830,90 L840,110 L850,100 L970,100 L980,65 L990,135 L1000,85 L1010,115 L1020,100 L1140,100 L1150,70 L1160,130 L1170,90 L1180,110 L1190,100 L1310,100 L1320,65 L1330,135 L1340,85 L1350,115 L1360,100 L1480,100 L1490,70 L1500,130 L1510,90 L1520,110 L1530,100 L1650,100 L1660,65 L1670,135 L1680,85 L1690,115 L1700,100 L1820,100 L1830,70 L1840,130 L1850,90 L1860,110 L1870,100 L1990,100 L2000,65 L2010,135 L2020,85 L2030,115 L2040,100 L2160,100 L2170,70 L2180,130 L2190,90 L2200,110 L2210,100 L2330,100 L2340,65 L2350,135 L2360,85 L2370,115 L2380,100 L2400,100" fill="none" stroke="rgba(99, 102, 241, 0.35)" stroke-width="1"/>

        </div>
    </div>

    <!-- Heartbeat ECG Line -->
    <div class="heartbeat-line">
        <svg viewBox="0 0 2400 80" preserveAspectRatio="none">
            <path d="M0,40 L100,40 L110,40 L120,10 L130,70 L140,25 L150,55 L160,40 L300,40 L310,40 L320,10 L330,70 L340,25 L350,55 L360,40 L500,40 L510,40 L520,10 L530,70 L540,25 L550,55 L560,40 L700,40 L710,40 L720,10 L730,70 L740,25 L750,55 L760,40 L900,40 L910,40 L920,10 L930,70 L940,25 L950,55 L960,40 L1100,40 L1110,40 L1120,10 L1130,70 L1140,25 L1150,55 L1160,40 L1300,40 L1310,40 L1320,10 L1330,70 L1340,25 L1350,55 L1360,40 L1500,40 L1510,40 L1520,10 L1530,70 L1540,25 L1550,55 L1560,40 L1700,40 L1710,40 L1720,10 L1730,70 L1740,25 L1750,55 L1760,40 L1900,40 L1910,40 L1920,10 L1930,70 L1940,25 L1950,55 L1960,40 L2100,40 L2110,40 L2120,10 L2130,70 L2140,25 L2150,55 L2160,40 L2300,40 L2310,40 L2320,10 L2330,70 L2340,25 L2350,55 L2360,40 L2400,40" fill="none" stroke="rgba(255, 0, 122, 0.3)" stroke-width="1.5"/>
        </svg>
    </div>

    <!-- Top Navigation Bar Instead of Sidebar -->
    <nav class="top-navbar">
        <a class="navbar-brand" href="{% url 'index' %}"><i class="fa-solid fa-moon text-white"></i> AI Sleep System</a>
        <ul class="nav-menu">
            <li><a class="nav-link" href="{% url 'index' %}"><i class="fa-solid fa-house"></i> Home</a></li>
            <li><a class="nav-link" href="{% url 'userLogin' %}"><i class="fa-solid fa-user-lock"></i> User Login</a></li>
            <li><a class="nav-link" href="{% url 'adminLogin' %}"><i class="fa-solid fa-user-shield"></i> Admin Login</a></li>
            <li><a class="nav-link" href="{% url 'userregister' %}"><i class="fa-solid fa-user-plus"></i> Register</a></li>
        </ul>
    </nav>

    {% block contents %}
    {% endblock %}

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.3/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <!-- Particles.js for Neural Network effect -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            particlesJS("particles-js", {
                "particles": {
                    "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
                    "color": { "value": ["#00f3ff", "#bc13fe", "#4d4dff"] },
                    "shape": { "type": ["circle", "triangle"] },
                    "opacity": { "value": 0.5, "random": true, "anim": { "enable": true, "speed": 1, "opacity_min": 0.1, "sync": false } },
                    "size": { "value": 3, "random": true, "anim": { "enable": true, "speed": 2, "size_min": 0.1, "sync": false } },
                    "line_linked": { "enable": true, "distance": 150, "color": "#00f3ff", "opacity": 0.2, "width": 1 },
                    "move": { "enable": true, "speed": 1, "direction": "none", "random": true, "straight": false, "out_mode": "out", "bounce": false }
                },
                "interactivity": {
                    "detect_on": "canvas",
                    "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": true, "mode": "push" }, "resize": true },
                    "modes": { "grab": { "distance": 140, "line_linked": { "opacity": 0.5 } }, "push": { "particles_nb": 2 } }
                },
                "retina_detect": true
            });
        });
    </script>
</body>

</html>
