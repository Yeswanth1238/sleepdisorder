<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sleep Disorder Classification</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    {% load static %}
    <style>
        :root {
            --primary-glow: #00f3ff;
            --secondary-glow: #bc13fe;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            overflow-x: hidden;
            overflow-y: auto;

            /* back.jpg as full background */
            background-image: url("{% static 'assets/img/sleep_index_1773590793302.png' %}");
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;

            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Light dark overlay - just enough for text readability */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(5, 8, 20, 0.45);
            z-index: 0;
            pointer-events: none;
        }

        /* ===== Dashboard Container ===== */
        .dashboard-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 1100px;
            margin: 40px auto;
            padding: 50px 40px;
            background: rgba(10, 14, 30, 0.40);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.09);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        /* ===== Header ===== */
        .header-section {
            margin-bottom: 50px;
        }

        /* ===== Title ===== */
        .title {
            font-size: clamp(2rem, 4.5vw, 3.5rem);
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 15px;
            background: linear-gradient(to right, var(--primary-glow), var(--secondary-glow), #ff007a);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.1rem;
            font-weight: 300;
            color: var(--text-muted);
            letter-spacing: 1.2px;
            max-width: 700px;
            margin: 0 auto;
        }

        /* ===== Button Grid ===== */
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 28px;
            padding: 10px;
        }

        .glow-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 38px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 22px;
            color: #fff;
            text-decoration: none;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .glow-btn:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(0, 243, 255, 0.35);
            box-shadow:
                0 20px 40px rgba(0, 0, 0, 0.4),
                0 0 25px rgba(0, 243, 255, 0.12) inset;
            color: #fff;
        }

        .glow-btn i {
            font-size: 2.8rem;
            margin-bottom: 18px;
            color: var(--text-muted);
            transition: color 0.3s ease, filter 0.3s ease, transform 0.3s ease;
        }

        .glow-btn:hover i {
            color: var(--primary-glow);
            filter: drop-shadow(0 0 12px rgba(0, 243, 255, 0.55));
            transform: scale(1.12);
        }

        .glow-btn:nth-child(2):hover i { color: #bc13fe; filter: drop-shadow(0 0 12px rgba(188,19,254,0.55)); }
        .glow-btn:nth-child(3):hover i { color: #00ffaa; filter: drop-shadow(0 0 12px rgba(0,255,170,0.55)); }
        .glow-btn:nth-child(4):hover i { color: #ff3366; filter: drop-shadow(0 0 12px rgba(255,51,102,0.55)); }
        .glow-btn:nth-child(5):hover i { color: #ffd700; filter: drop-shadow(0 0 12px rgba(255,215,0,0.55)); }

        .btn-title {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.4px;
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .dashboard-container { padding: 30px 20px; }
            .glow-btn { padding: 25px 15px; }
            .glow-btn i { font-size: 2.3rem; }
            .btn-title { font-size: 1rem; }
            body { padding: 30px 0; }
        }
    </style>
</head>

<body>

    <div class="container-fluid d-flex justify-content-center">
        <div class="dashboard-container">

            <div class="header-section">
                <h1 class="title">Sleep Disorder Classification using Machine Learning</h1>
                <p class="subtitle">Advanced Machine Learning Classification System for analyzing and predicting sleep abnormalities</p>
            </div>

            <div class="btn-grid">
                <a href="{% url 'index' %}" class="glow-btn">
                    <i class="fa-solid fa-house-chimney-medical"></i>
                    <span class="btn-title">Home</span>
                </a>

                <a href="{% url 'userLogin' %}" class="glow-btn">
                    <i class="fa-solid fa-user-lock"></i>
                    <span class="btn-title">User Login</span>
                </a>

                <a href="{% url 'userregister' %}" class="glow-btn">
                    <i class="fa-solid fa-user-plus"></i>
                    <span class="btn-title">User Registration</span>
                </a>

                <a href="{% url 'adminLogin' %}" class="glow-btn">
                    <i class="fa-solid fa-user-shield"></i>
                    <span class="btn-title">Admin Login</span>
                </a>

                <a href="{% url 'about' %}" class="glow-btn">
                    <i class="fa-solid fa-circle-info"></i>
                    <span class="btn-title">About Page</span>
                </a>
            </div>

        </div>
    </div>

</body>
</html>
